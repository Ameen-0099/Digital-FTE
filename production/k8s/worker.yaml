# NexusFlow Customer Success Digital FTE - Agent Worker Deployment
# ==================================================================
# Message Processor worker that consumes from Kafka and runs the AI agent

apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-fte-worker
  namespace: digital-fte
  labels:
    app: digital-fte-worker
    component: worker
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digital-fte-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: digital-fte-worker
        component: worker
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: worker
          image: nexusflow-digital-fte:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - production.workers.message_processor
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: DATABASE_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: KAFKA_TOPIC
            - name: KAFKA_CONSUMER_GROUP
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: KAFKA_CONSUMER_GROUP
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: digital-fte-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: OPENAI_MODEL
            - name: MAX_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: MAX_RETRIES
            - name: BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: KAFKA_BATCH_SIZE
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: LOG_LEVEL
            # Gmail configuration (optional)
            - name: GMAIL_SERVICE_ACCOUNT_FILE
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: GMAIL_SERVICE_ACCOUNT_FILE
            - name: GMAIL_DELEGATED_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: GMAIL_DELEGATED_EMAIL
            # Twilio configuration (optional)
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: digital-fte-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: digital-fte-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_WHATSAPP_NUMBER
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: TWILIO_WHATSAPP_NUMBER
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
      volumes:
        - name: logs
          emptyDir: {}
        - name: secrets
          secret:
            secretName: digital-fte-secrets
            defaultMode: 0640
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: digital-fte-worker
                topologyKey: kubernetes.io/hostname

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: digital-fte-worker-hpa
  namespace: digital-fte
  labels:
    app: digital-fte-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digital-fte-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
