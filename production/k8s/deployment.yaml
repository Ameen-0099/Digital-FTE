# NexusFlow Customer Success Digital FTE - API Deployment
# =========================================================
# FastAPI API server deployment for Kubernetes

apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-fte-api
  namespace: digital-fte
  labels:
    app: digital-fte-api
    component: api
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: digital-fte-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: digital-fte-api
        component: api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: nexusflow-digital-fte:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: DATABASE_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: KAFKA_TOPIC
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: digital-fte-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: OPENAI_MODEL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: CORS_ORIGINS
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: DEBUG
            - name: METRICS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: digital-fte-config
                  key: METRICS_ENABLED
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
      volumes:
        - name: logs
          emptyDir: {}
        - name: secrets
          secret:
            secretName: digital-fte-secrets
            defaultMode: 0640
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: digital-fte-api
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: digital-fte-api-service
  namespace: digital-fte
  labels:
    app: digital-fte-api
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: digital-fte-api

---
apiVersion: v1
kind: Service
metadata:
  name: digital-fte-api-external
  namespace: digital-fte
  labels:
    app: digital-fte-api
    component: api
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: digital-fte-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: digital-fte-api-hpa
  namespace: digital-fte
  labels:
    app: digital-fte-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digital-fte-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
