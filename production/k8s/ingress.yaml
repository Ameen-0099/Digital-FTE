# NexusFlow Customer Success Digital FTE - Ingress
# ==================================================
# Kubernetes Ingress for external access with TLS

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digital-fte-ingress
  namespace: digital-fte
  labels:
    app: digital-fte
  annotations:
    # NGINX Ingress annotations
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst: "200"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # Monitoring
    nginx.ingress.kubernetes.io/enable-access-log: "true"
    
    # Certificate management (cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.nexusflow.com
        - support.nexusflow.com
      secretName: digital-fte-tls
  rules:
    - host: api.nexusflow.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: digital-fte-api-service
                port:
                  number: 80
    - host: support.nexusflow.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: digital-fte-api-service
                port:
                  number: 80
          - path: /webhook/gmail
            pathType: Exact
            backend:
              service:
                name: digital-fte-api-service
                port:
                  number: 80
          - path: /webhook/whatsapp
            pathType: Exact
            backend:
              service:
                name: digital-fte-api-service
                port:
                  number: 80
          - path: /support
            pathType: Prefix
            backend:
              service:
                name: digital-fte-api-service
                port:
                  number: 80

---
# ClusterIssuer for Let's Encrypt (if not already created)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@nexusflow.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# Alternative: Simple Ingress without TLS (for development)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digital-fte-ingress-dev
  namespace: digital-fte
  labels:
    app: digital-fte
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: digital-fte.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: digital-fte-api-service
                port:
                  number: 80
