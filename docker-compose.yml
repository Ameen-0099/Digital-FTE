# NexusFlow Customer Success Digital FTE - Docker Compose
# ========================================================
# Local development and testing environment
# Includes: FastAPI API, Agent Worker, Kafka, Zookeeper, PostgreSQL

version: '3.8'

services:
  # =============================================================================
  # FASTAPI API
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-fte-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/nexusflow
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=customer-support-tickets
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4-turbo-preview
      - CORS_ORIGINS=*
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./production:/app/production:ro
    networks:
      - digital-fte-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # AGENT WORKER (Message Processor)
  # =============================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-fte-worker
    command: python -m production.workers.message_processor
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/nexusflow
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=customer-support-tickets
      - KAFKA_CONSUMER_GROUP=digital-fte-agent
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4-turbo-preview
      - MAX_RETRIES=3
      - BATCH_SIZE=100
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./production:/app/production:ro
    networks:
      - digital-fte-network
    restart: unless-stopped

  # =============================================================================
  # POSTGRESQL (with pgvector)
  # =============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: digital-fte-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nexusflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./production/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - digital-fte-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # ZOOKEEPER (for Kafka)
  # =============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: digital-fte-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - digital-fte-network
    restart: unless-stopped

  # =============================================================================
  # KAFKA
  # =============================================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: digital-fte-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "customer-support-tickets:1:1,customer-support-errors:1:1"
    depends_on:
      - zookeeper
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - digital-fte-network
    restart: unless-stopped

  # =============================================================================
  # KAFKA UI (optional - for development)
  # =============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: digital-fte-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: digital-fte
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - digital-fte-network
    restart: unless-stopped

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  digital-fte-network:
    driver: bridge

# =============================================================================
# USAGE INSTRUCTIONS
# =============================================================================
# Start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f api
#   docker-compose logs -f worker
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes:
#   docker-compose down -v
#
# Access API docs:
#   http://localhost:8000/docs
#
# Access Kafka UI:
#   http://localhost:8080
