# DigitalOcean App Platform Configuration
# NexusFlow Customer Success Digital FTE
# ==========================================

name: nexusflow-fte

services:
  - name: nexusflow-api
    # Source Code
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_USERNAME/hackhaton_five
    
    # Build Configuration
    dockerfile_path: Dockerfile
    http_port: 8000
    
    # Scaling
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/month
    
    # Environment Variables
    envs:
      - key: OPENAI_API_KEY
        value: your-openai-api-key
        scope: RUN_TIME
      
      - key: DATABASE_URL
        value: ${nexusflow-db.DATABASE_URL}
        scope: RUN_TIME
      
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: localhost:9092
        scope: RUN_TIME
      
      - key: ENVIRONMENT
        value: production
        scope: RUN_TIME
      
      - key: LOG_LEVEL
        value: INFO
        scope: RUN_TIME
      
      - key: APP_NAME
        value: NexusFlow Digital FTE
        scope: RUN_TIME
      
      - key: APP_VERSION
        value: 1.0.0
        scope: RUN_TIME
    
    # Routing
    routes:
      - path: /
    
    # Health Check
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    
    # Alerts
    alerts:
      - rule: CPU_UTILIZATION > 80%
        window: 5m
      - rule: MEM_UTILIZATION > 80%
        window: 5m

# Managed Database
databases:
  - name: nexusflow-db
    engine: PG
    production: false
    version: "15"
    num_nodes: 1
    size: db-s-dev-database

# Static Output (for logs/metrics)
static_sites:
  - name: nexusflow-static
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_USERNAME/hackhaton_five
    output_dir: static
    routes:
      - path: /static
